app:
  name: "file_tool"
  title: "File Tool"
  width: 900
  height: 700
  min_size: [600, 400]
  max_size: [1920, 1080]
  resizable: true
  icon: "assets/icon.ico"
  singleton: false
  centered: true
  theme: dark

  dev:
    enabled: true
    vite_port: 5173
    debug: true

logging:
  level: INFO
  console: true
  to_frontend: true
  file: ""
  max_lines: 1000

process:
  default_timeout: 300

business: {}
